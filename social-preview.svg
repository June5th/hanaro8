<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="pill-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="circle-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1E293B" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" rx="40" fill="url(#bg-grad)"/>
  <circle cx="150" cy="80" r="120" fill="#DBEAFE" opacity="0.6"/>
  <circle cx="1080" cy="560" r="140" fill="#BAE6FD" opacity="0.5"/>

  <!-- Main card -->
  <g filter="url(#shadow)">
    <rect x="120" y="110" width="960" height="410" rx="32" fill="white"/>
  </g>

  <!-- Left: text -->
  <g transform="translate(170,160)">
    <rect x="0" y="0" width="220" height="32" rx="16" fill="#F3F4F6" opacity="0.9"/>
    <circle cx="20" cy="16" r="6" fill="url(#pill-grad)"/>
    <text x="38" y="20" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="14" fill="#0F172A" opacity="0.8">
      중학생을 위한 금융 학습
    </text>

    <text x="0" y="82" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="34" font-weight="700" fill="#0F172A">
      중학생을 위한 5분 금융 학습
    </text>
    <text x="0" y="124" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="34" font-weight="700" fill="#0F172A">
      + 투자 시뮬레이션
    </text>

    <text x="0" y="174" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" fill="#475569">
      외우는 금융이 아니라, 경험하는 금융
    </text>

    <!-- Bullet chips -->
    <g transform="translate(0,210)">
      <rect x="0" y="0" width="260" height="34" rx="17" fill="#EFF6FF"/>
      <circle cx="20" cy="17" r="7" fill="#2563EB"/>
      <path d="M18 17.5L19.7 19.2L23 15.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="22" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="14" fill="#1F2937">
        5~10분 짧은 학습 콘텐츠
      </text>

      <rect x="0" y="46" width="220" height="34" rx="17" fill="#ECFEFF"/>
      <circle cx="20" cy="63" r="7" fill="#0EA5E9"/>
      <path d="M18 63.5L19.7 65.2L23 61.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="68" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="14" fill="#1F2937">
        투자 시뮬레이션 미니게임
      </text>
    </g>

    <!-- CTA pill -->
    <g transform="translate(0,310)">
      <rect x="0" y="0" width="260" height="44" rx="22" fill="url(#pill-grad)"/>
      <text x="26" y="28"
            font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="16" font-weight="600" fill="white">
        베타 테스트 신청하기
      </text>
    </g>
  </g>

  <!-- Right: simple illustration -->
  <g transform="translate(720,170)">
    <!-- device frame -->
    <rect x="40" y="0" width="260" height="280" rx="28" fill="#0F172A" opacity="0.95"/>
    <rect x="48" y="20" width="244" height="244" rx="20" fill="#F8FAFC"/>

    <!-- chart area -->
    <g transform="translate(68,44)">
      <rect x="0" y="0" width="204" height="90" rx="14" fill="#EFF6FF"/>
      <!-- grid lines -->
      <line x1="14" y1="26" x2="190" y2="26" stroke="#DBEAFE" stroke-width="1"/>
      <line x1="14" y1="50" x2="190" y2="50" stroke="#DBEAFE" stroke-width="1"/>
      <line x1="14" y1="74" x2="190" y2="74" stroke="#DBEAFE" stroke-width="1"/>
      <!-- line chart -->
      <polyline points="16,70 54,62 92,48 130,56 168,32 188,28"
                fill="none" stroke="#2563EB" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round"/>
      <!-- growth dot -->
      <circle cx="168" cy="32" r="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
    </g>

    <!-- coins -->
    <g transform="translate(86,154)">
      <ellipse cx="32" cy="54" rx="32" ry="12" fill="#FDE68A"/>
      <rect x="8" y="18" width="48" height="40" rx="10" fill="#FBBF24"/>
      <ellipse cx="32" cy="18" rx="24" ry="10" fill="#FACC15"/>
      <text x="24" y="43" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="18" font-weight="700" fill="#92400E">₩</text>
    </g>

    <!-- student avatar -->
    <g transform="translate(190,150)">
      <circle cx="54" cy="38" r="34" fill="url(#circle-grad)" opacity="0.95"/>
      <circle cx="54" cy="34" r="18" fill="#F9FAFB"/>
      <path d="M44 62C46.5 54 51 50 54 50C57 50 61.5 54 64 62" stroke="#F9FAFB" stroke-width="4" stroke-linecap="round"/>
      <circle cx="48" cy="32" r="2.4" fill="#0F172A"/>
      <circle cx="60" cy="32" r="2.4" fill="#0F172A"/>
      <path d="M49 39C50.5 40.5 52.2 41.2 54 41.2C55.8 41.2 57.5 40.5 59 39"
            stroke="#0F172A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Logo -->
  <g transform="translate(170,120)">
    <rect x="0" y="0" width="34" height="34" rx="10" fill="url(#pill-grad)"/>
    <text x="46" y="23"
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="20" font-weight="800" fill="#0F172A">
      FinMVP
    </text>
  </g>
</svg>
